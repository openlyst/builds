name: Poll Source Repos And Dispatch Builds
 
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.poll.outputs.any_changed }}
      changed_matrix_json: ${{ steps.poll.outputs.changed_matrix_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Poll watched repositories
        id: poll
        run: |
          mkdir -p out
          python scripts/poll-source-repos.py \
            --config config/watched-repos.json \
            --state state/watched-heads.json \
            --changes-out out/changed-repos.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Commit updated watcher state
        run: |
          if git diff --quiet -- state/watched-heads.json; then
            echo "No watcher state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/watched-heads.json
          git commit -m "chore(watcher): update watched heads"
          git push origin main

      - name: Upload poll result artifact
        uses: actions/upload-artifact@v4
        with:
          name: poll-changes
          path: out/changed-repos.json
          if-no-files-found: error

  dispatch-builds:
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.poll.outputs.changed_matrix_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dispatch changed app build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/dispatch-build-workflow.py \
            --config config/watched-repos.json \
            --slug "${{ matrix.item.slug }}" \
            --commit "${{ matrix.item.commit }}" \
            --workflow build.yml \
            --ref main
