          }
          EOF

      - name: Validate JSON files
        run: |
          python3 -m json.tool build-v2/altstore.json > /dev/null
          python3 -m json.tool build-v2/apps.json > /dev/null

      - name: Create GitHub Release
        id: release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.setup.outputs.release_tag }}
          release_name: Doudou ${{ needs.setup.outputs.version }} (${{ needs.setup.outputs.build_date }})
          body: ${{ needs.setup.outputs.changelog }}
          draft: false
          prerelease: ${{ needs.setup.outputs.build_type != 'stable' }}

      - name: Upload iOS IPA to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-ios/${{ needs.build-ios.outputs.artifact_name }}
          asset_name: ${{ needs.build-ios.outputs.artifact_name }}
          asset_content_type: application/octet-stream

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-android/${{ needs.build-android.outputs.apk_name }}
          asset_name: ${{ needs.build-android.outputs.apk_name }}
          asset_content_type: application/vnd.android.package-archive

      - name: Upload AAB to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-android/${{ needs.build-android.outputs.aab_name }}
          asset_name: ${{ needs.build-android.outputs.aab_name }}
          asset_content_type: application/octet-stream

      - name: Upload Windows ZIP to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-windows/${{ needs.build-windows.outputs.zip_name }}
          asset_name: ${{ needs.build-windows.outputs.zip_name }}
          asset_content_type: application/zip

      - name: Upload Windows EXE to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-windows/${{ needs.build-windows.outputs.exe_name }}
          asset_name: ${{ needs.build-windows.outputs.exe_name }}
          asset_content_type: application/octet-stream

      - name: Upload Linux ZIP to release
        if: ${{ needs.build-linux.outputs.build_status == 'success' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-linux/${{ needs.build-linux.outputs.zip_name }}
          asset_name: ${{ needs.build-linux.outputs.zip_name }}
          asset_content_type: application/zip

      - name: Upload Linux AppImage to release
        if: ${{ needs.build-linux.outputs.build_status == 'success' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-linux/artifacts/${{ needs.build-linux.outputs.appimage_name }}
          asset_name: ${{ needs.build-linux.outputs.appimage_name }}
          asset_content_type: application/vnd.appimage

      - name: Upload Linux DEB to release
        if: ${{ needs.build-linux.outputs.build_status == 'success' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-linux/artifacts/${{ needs.build-linux.outputs.deb_name }}
          asset_name: ${{ needs.build-linux.outputs.deb_name }}
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload macOS ZIP to release
        if: ${{ needs.build-macos.outputs.build_status == 'success' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./artifacts/doudou-macos/${{ needs.build-macos.outputs.artifact_name }}
          asset_name: ${{ needs.build-macos.outputs.artifact_name }}
          asset_content_type: application/zip

      - name: Upload metadata files
        uses: actions/upload-artifact@v4
        with:
          name: build-v2-metadata
          path: build-v2/

  # ============================================================================
  # PUSH AUR PACKAGES
  # ============================================================================
  push-aur:
    needs: [setup, generate-metadata]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.generate-metadata.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate AUR PKGBUILDs
        run: |
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "stable" ]; then
            python build.py --target aur --verbose
          elif [ "$BUILD_TYPE" == "nightly" ]; then
            python build.py --target aur --nightly-aur-only --verbose
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            python build.py --target aur --unstable-aur-only --verbose
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

      - name: Generate .SRCINFO for AUR packages
        run: |
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "nightly" ]; then
            PKG_PATTERN="aur-packages/doudou-nightly/"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            PKG_PATTERN="aur-packages/doudou-unstable/"
          elif [ "$BUILD_TYPE" == "stable" ]; then
            PKG_PATTERN="aur-packages/doudou-bin/"
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

          shopt -s nullglob
          for pkg in $PKG_PATTERN; do
            pkg=$(basename "$pkg")
            if [ ! -f "aur-packages/$pkg/PKGBUILD" ]; then continue; fi
            docker run --rm \
              -v "$PWD/aur-packages/$pkg:/pkg:rw" \
              archlinux:latest \
              bash -c "pacman -Syu --noconfirm base-devel 2>/dev/null; useradd -m -u 1000 builduser; chown -R builduser:builduser /pkg; su builduser -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"
          done

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY_BASE64: ${{ secrets.AUR_SSH_KEY_BASE64 }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$AUR_SSH_KEY_BASE64" | base64 -d > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push packages to AUR
        env:
          AUR_SSH_KEY_PASSWORD: ${{ secrets.AUR_SSH_KEY_PASSWORD }}
        run: |
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "nightly" ]; then
            PKG_PATTERN="aur-packages/doudou-nightly/"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            PKG_PATTERN="aur-packages/doudou-unstable/"
          elif [ "$BUILD_TYPE" == "stable" ]; then
            PKG_PATTERN="aur-packages/doudou-bin/"
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

          set -e
          eval "$(ssh-agent -s)"
          printf '%s' "$AUR_SSH_KEY_PASSWORD" | ssh-add ~/.ssh/aur_key 2>/dev/null || true
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
          mkdir -p aur-push
          shopt -s nullglob
          for pkg in $PKG_PATTERN; do
            pkg=$(basename "$pkg")
            if [ ! -f "aur-packages/$pkg/PKGBUILD" ]; then continue; fi
            echo "Updating AUR package: $pkg"
            if ! git clone --depth 1 "ssh://aur@aur.archlinux.org/${pkg}.git" "aur-push/$pkg" 2>&1; then
              echo "::warning::Clone failed for $pkg (create package on AUR first or check push access)"
              continue
            fi
            cp -f "aur-packages/$pkg/PKGBUILD" "aur-packages/$pkg/.SRCINFO" "aur-push/$pkg/" 2>/dev/null || true
            cd "aur-push/$pkg"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PKGBUILD .SRCINFO
            if ! git diff --staged --quiet; then
              git commit -m "Update to latest from GitHub releases (Build Apps)"
              git push origin master
            else
              echo "No changes for $pkg"
            fi
            cd ../..
          done
          rm -rf aur-push

  # ============================================================================
  # COMMIT METADATA TO REPOSITORY
  # ============================================================================
  commit-metadata:
    needs: generate-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: build-v2-metadata
          path: build-v2

      - name: Commit metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-v2/
          git diff --staged --quiet || git commit -m "Update build-v2 metadata for ${{ needs.generate-metadata.outputs.release_created }}"
          git push
