                  },
                  "Linux": {
                    "zip": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/doudou-${VERSION}-${DATE}-linux-x64.zip",
                      "arm64": ""
                    },
                    "appimage": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/doudou-${VERSION}-${DATE}-linux-x86_64.AppImage",
                      "arm64": ""
                    },
                    "deb": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/doudou-${VERSION}-${DATE}-linux-amd64.deb",
                      "arm64": ""
                    },
                    "aur": {
                      "x86_64": "",
                      "arm64": ""
                    }
                  },
                  "Android": {
                    "apk": "https://github.com/openlyst/builds/releases/download/${TAG}/doudou-${VERSION}-${DATE}.apk",
                    "aab": "https://github.com/openlyst/builds/releases/download/${TAG}/doudou-${VERSION}-${DATE}.aab"
                  }
