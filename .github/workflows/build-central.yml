name: Centralized Builder

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC for nightly builds
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build'
        required: true
        type: choice
        options:
          - doudou
          - klit
        default: 'doudou'
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - nightly
          - pre-release
          - stable
        default: 'nightly'
      commit_hash:
        description: 'Commit hash (leave empty for latest)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  FLUTTER_VERSION: 'stable'

jobs:
  # ============================================================================
  # SETUP AND METADATA FETCH
  # ============================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.app_config.outputs.app_name }}
      repo_url: ${{ steps.app_config.outputs.repo_url }}
      bundle_id: ${{ steps.app_config.outputs.bundle_id }}
      icon_url: ${{ steps.app_config.outputs.icon_url }}
      screenshot_base: ${{ steps.app_config.outputs.screenshot_base }}
      screenshots: ${{ steps.app_config.outputs.screenshots }}
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.version.outputs.build_date }}
      build_type: ${{ steps.build_type.outputs.build_type }}
      release_tag: ${{ steps.release_tag.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      commit_hash: ${{ steps.commit.outputs.hash }}
    steps:
      - name: Set build type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "build_type=nightly" >> $GITHUB_OUTPUT
          else
            echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          fi

      - name: Set app configuration
        id: app_config
        run: |
          APP="${{ github.event.inputs.app_name || 'doudou' }}"
          echo "app_name=$APP" >> $GITHUB_OUTPUT

          if [ "$APP" == "doudou" ]; then
            echo "repo_url=https://gitlab.com/Openlyst/doudou.git" >> $GITHUB_OUTPUT
            echo "bundle_id=doudou" >> $GITHUB_OUTPUT
            echo "icon_url=https://openlyst.ink/favicon.svg" >> $GITHUB_OUTPUT
            echo "screenshot_base=https://gitlab.com/Openlyst/doudou/-/raw/main/images/screenshots" >> $GITHUB_OUTPUT
            echo "screenshots=home.png,nowplaying.png,albums.png" >> $GITHUB_OUTPUT
          elif [ "$APP" == "klit" ]; then
            echo "repo_url=https://gitlab.com/Openlyst/klit.git" >> $GITHUB_OUTPUT
            echo "bundle_id=gitlab.openlyst.klit" >> $GITHUB_OUTPUT
            echo "icon_url=https://gitlab.com/Openlyst/klit/-/raw/main/assets/icon/app/icon.png?ref_type=heads" >> $GITHUB_OUTPUT
            echo "screenshot_base=https://gitlab.com/Openlyst/klit/-/raw/main/images/screenshots" >> $GITHUB_OUTPUT
            echo "screenshots=home.png,popular.png,post.png" >> $GITHUB_OUTPUT
          fi

      - name: Clone GitLab Repo
        run: git clone ${{ steps.app_config.outputs.repo_url }} app-source

      - name: Checkout specific commit
        id: commit
        if: ${{ github.event.inputs.commit_hash != '' }}
        working-directory: app-source
        run: |
          git checkout ${{ github.event.inputs.commit_hash }}
          echo "hash=${{ github.event.inputs.commit_hash }}" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: commit_hash
        if: ${{ github.event.inputs.commit_hash == '' }}
        working-directory: app-source
        run: |
          HASH=$(git rev-parse HEAD)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Get version from pubspec
        id: version
        working-directory: app-source
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | cut -d'+' -f1)
          BUILD_DATE=$(date +%Y-%m-%d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: release_tag
        run: |
          BUILD_TYPE="${{ steps.build_type.outputs.build_type }}"
          VERSION="${{ steps.version.outputs.version }}"
          DATE="${{ steps.version.outputs.build_date }}"
          TIME=$(date +%H%M%S)
          
          TAG="app-update-${DATE}-${TIME}"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Fetch changelog
        id: changelog
        run: |
          APP="${{ steps.app_config.outputs.app_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TYPE="${{ steps.build_type.outputs.build_type }}"

          # For nightly, use a generic message
          if [ "$BUILD_TYPE" == "nightly" ]; then
            CHANGELOG="# Nightly Build ${{ steps.version.outputs.build_date }}\n\nAutomated nightly build from main branch."
            echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
          else
            # Fetch changelog from GitLab
            REPO_URL="${{ steps.app_config.outputs.repo_url }}"
            # Extract repo name from URL (e.g., doudou from https://gitlab.com/Openlyst/doudou.git)
            REPO_NAME=$(basename "$REPO_URL" .git)
            URL="https://gitlab.com/Openlyst/${REPO_NAME}/-/raw/main/changelog/${VERSION}.md"
            RESPONSE=$(curl -s -w "\n%{http_code}" "$URL")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            CONTENT=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" == "200" ]; then
              # Convert newlines for GitHub Output
              CHANGELOG=$(echo "$CONTENT" | sed ':a;N;$!ba;s/\n/\\n/g')
              echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
            else
              CHANGELOG=""
              echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: app-source
          path: app-source

  # ============================================================================
  # IOS BUILD
  # ============================================================================
  build-ios:
    needs: setup
    runs-on: macos-latest
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
      artifact_path: ${{ steps.artifact.outputs.path }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: app-source
          path: .

      - name: Fix RepeatMode conflict with Flutter
        run: |
          AUDIO_HANDLER="lib/services/audio/unified_audio_handler.dart"
          if [ -f "$AUDIO_HANDLER" ]; then
            perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$AUDIO_HANDLER"
            find lib -name "*.dart" -exec grep -l "unified_audio_handler" {} \; | while read f; do
              [ "$f" = "$AUDIO_HANDLER" ] || ! grep -q '\bRepeatMode\b' "$f" || perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$f"
            done
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add x86_64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Build iOS (No Code Signing)
        run: |
          flutter pub get

          # Work around terminate_restart Swift compile failure
          PLUGIN_SWIFT=$(find "$HOME/.pub-cache" -type f -path "*/terminate_restart*/ios/Classes/TerminateRestartPlugin.swift" | head -n 1)
          if [ -n "$PLUGIN_SWIFT" ] && [ -f "$PLUGIN_SWIFT" ]; then
            perl -i -pe 's/if let flutterEngine = registrar\.messenger\(\) as\??!? FlutterEngine \{/if true {\n            let flutterEngine = registrar.messenger() as! FlutterEngine/' "$PLUGIN_SWIFT"
          fi

          dart run flutter_rust_bridge_codegen build-ios --release 2>/dev/null || true

          if [ -f "Makefile" ]; then
            make ios || true
          fi

          if [ -f "scripts/build-ios.sh" ]; then
            bash scripts/build-ios.sh || true
          fi

          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ${APP}-${VERSION}-${DATE}-ios-unsigned.ipa Payload/
          rm -rf Payload

      - name: Set artifact info
        id: artifact
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          echo "name=${APP}-${VERSION}-${DATE}-ios-unsigned.ipa" >> $GITHUB_OUTPUT
          echo "path=${APP}-${VERSION}-${DATE}-ios-unsigned.ipa" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-ios
          path: ${{ needs.setup.outputs.app_name }}-*-ios-unsigned.ipa

  # ============================================================================
  # ANDROID BUILD
  # ============================================================================
  build-android:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.artifact.outputs.apk_name }}
      aab_name: ${{ steps.artifact.outputs.aab_name }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: app-source
          path: .

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android
        run: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

      - name: Rename artifacts
        id: artifact
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"

          mv build/app/outputs/flutter-apk/app-release.apk ${APP}-${VERSION}-${DATE}.apk
          mv build/app/outputs/bundle/release/app-release.aab ${APP}-${VERSION}-${DATE}.aab

          echo "apk_name=${APP}-${VERSION}-${DATE}.apk" >> $GITHUB_OUTPUT
          echo "aab_name=${APP}-${VERSION}-${DATE}.aab" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-android
          path: |
            ${{ needs.setup.outputs.app_name }}-*.apk
            ${{ needs.setup.outputs.app_name }}-*.aab

  # ============================================================================
  # WINDOWS BUILD
  # ============================================================================
  build-windows:
    needs: setup
    runs-on: windows-latest
    continue-on-error: true
    outputs:
      zip_name: ${{ steps.artifact.outputs.zip_name }}
      exe_name: ${{ steps.artifact.outputs.exe_name }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: app-source
          path: .

      - name: Fix RepeatMode conflict with Flutter
        shell: bash
        run: |
          AUDIO_HANDLER="lib/services/audio/unified_audio_handler.dart"
          if [ -f "$AUDIO_HANDLER" ]; then
            perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$AUDIO_HANDLER"
            find lib -name "*.dart" -exec grep -l "unified_audio_handler" {} \; | while read f; do
              [ "$f" = "$AUDIO_HANDLER" ] || ! grep -q '\bRepeatMode\b' "$f" || perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$f"
            done
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Patch clipboard plugin (Windows C4189)
        shell: bash
        run: |
          cache="${PUB_CACHE:-$HOME/.pub-cache}"
          [ -d "$cache" ] || cache="/c/Users/$USER/AppData/Local/Pub/Cache"
          f=$(find "$cache" -name "clipboard_plugin.cpp" -path "*/clipboard/*" 2>/dev/null | head -1)
          if [ -n "$f" ] && grep -q "headerSize" "$f"; then
            sed -i.bak '/headerSize.*=/a\  (void)headerSize;' "$f" && rm -f "${f}.bak" || true
          fi

      - name: Build Windows
        id: build
        run: |
          flutter build windows --release 2>&1 | Tee-Object -Variable buildOutput
          $warnings = ($buildOutput | Select-String -Pattern "warning|deprecated" -AllMatches).Matches.Count
          echo "warnings=$warnings" >> $env:GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          $app = "${{ needs.setup.outputs.app_name }}"
          $version = "${{ needs.setup.outputs.version }}"
          $date = "${{ needs.setup.outputs.build_date }}"
          $filename = "${app}-${version}-${date}-windows-x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $filename

      - name: Create Inno Setup Script
        run: |
          $app = "${{ needs.setup.outputs.app_name }}"
          $version = "${{ needs.setup.outputs.version }}"
          $date = "${{ needs.setup.outputs.build_date }}"
          @"
          [Setup]
          AppName=$app
          AppVersion=$version
          AppPublisher=Openlyst
          DefaultDirName={autopf}\$app
          DefaultGroupName=$app
          OutputDir=.
          OutputBaseFilename=$app-$version-$date-windows-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64compatible
          WizardStyle=modern
          UninstallDisplayIcon={app}\$app.exe
          PrivilegesRequired=lowest

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\$app"; Filename: "{app}\$app.exe"
          Name: "{group}\{cm:UninstallProgram,$app}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\$app"; Filename: "{app}\$app.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\$app.exe"; Description: "{cm:LaunchProgram,$app}"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -FilePath installer.iss -Encoding UTF8

      - name: Build Windows Installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Set artifact info
        id: artifact
        run: |
          $app = "${{ needs.setup.outputs.app_name }}"
          $version = "${{ needs.setup.outputs.version }}"
          $date = "${{ needs.setup.outputs.build_date }}"
          echo "zip_name=${app}-${version}-${date}-windows-x64.zip" >> $env:GITHUB_OUTPUT
          echo "exe_name=${app}-${version}-${date}-windows-x64-setup.exe" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-windows
          path: |
            ${{ needs.setup.outputs.app_name }}-*-windows-x64.zip
            ${{ needs.setup.outputs.app_name }}-*-windows-x64-setup.exe

  # ============================================================================
  # LINUX BUILD
  # ============================================================================
  build-linux:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    outputs:
      zip_name: ${{ steps.artifact.outputs.zip_name }}
      appimage_name: ${{ steps.artifact.outputs.appimage_name }}
      deb_name: ${{ steps.artifact.outputs.deb_name }}
      build_status: ${{ steps.status.outputs.status }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: app-source
          path: .

      - name: Fix RepeatMode conflict with Flutter
        run: |
          AUDIO_HANDLER="lib/services/audio/unified_audio_handler.dart"
          if [ -f "$AUDIO_HANDLER" ]; then
            perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$AUDIO_HANDLER"
            find lib -name "*.dart" -exec grep -l "unified_audio_handler" {} \; | while read f; do
              [ "$f" = "$AUDIO_HANDLER" ] || ! grep -q '\bRepeatMode\b' "$f" || perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$f"
            done
          fi

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libmpv-dev dpkg-dev rpm wget file squashfs-tools patchelf plocate libfuse2 libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libayatana-appindicator3-dev
          sudo updatedb || true

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install appimagetool
        run: |
          wget -q -O /tmp/appimagetool.AppImage "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool.AppImage
          cd /tmp && ./appimagetool.AppImage --appimage-extract
          sudo mv /tmp/squashfs-root /opt/appimagetool
          sudo ln -sf /opt/appimagetool/AppRun /usr/local/bin/appimagetool
          appimagetool --version || echo "appimagetool installed"

      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release --build-name=${{ needs.setup.outputs.version }}

      - name: Create ZIP
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          cd build/linux/x64/release
          zip -r $GITHUB_WORKSPACE/${APP}-${VERSION}-${DATE}-linux-x64.zip bundle/

      - name: Install fastforge and build packages
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          dart pub global activate fastforge
          export PATH="$PATH:$HOME/.pub-cache/bin"
          export PUB_CACHE="$HOME/.pub-cache"
          mkdir -p artifacts

          echo "=== Building DEB package ==="
          $HOME/.pub-cache/bin/fastforge package --platform linux --targets deb --skip-clean || echo "DEB build failed or had warnings"

          echo "=== Building RPM package ==="
          $HOME/.pub-cache/bin/fastforge package --platform linux --targets rpm --skip-clean || echo "RPM build failed or had warnings"

          echo "=== Building AppImage package ==="
          $HOME/.pub-cache/bin/fastforge package --platform linux --targets appimage --skip-clean || echo "AppImage build failed or had warnings"

          echo "=== Copying artifacts ==="
          find dist -name "*.deb" -exec cp {} artifacts/${APP}-${VERSION}-${DATE}-linux-amd64.deb \; 2>/dev/null || true
          find dist -name "*.rpm" -exec cp {} artifacts/${APP}-${VERSION}-${DATE}-linux-amd64.rpm \; 2>/dev/null || true
          find dist -name "*.AppImage" -exec cp {} artifacts/${APP}-${VERSION}-${DATE}-linux-x86_64.AppImage \; 2>/dev/null || true

          echo "=== Final Artifacts ==="
          ls -la artifacts/ || true

      - name: Set artifact info
        id: artifact
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          echo "zip_name=${APP}-${VERSION}-${DATE}-linux-x64.zip" >> $GITHUB_OUTPUT
          echo "appimage_name=${APP}-${VERSION}-${DATE}-linux-x86_64.AppImage" >> $GITHUB_OUTPUT
          echo "deb_name=${APP}-${VERSION}-${DATE}-linux-amd64.deb" >> $GITHUB_OUTPUT

      - name: Set build status
        id: status
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-linux
          path: |
            ${{ needs.setup.outputs.app_name }}-*-linux-x64.zip
            artifacts/*.AppImage
            artifacts/*.deb

  # ============================================================================
  # MACOS BUILD
  # ============================================================================
  build-macos:
    needs: setup
    runs-on: macos-latest
    continue-on-error: true
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
      build_status: ${{ steps.status.outputs.status }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: app-source
          path: .

      - name: Fix RepeatMode conflict with Flutter
        run: |
          AUDIO_HANDLER="lib/services/audio/unified_audio_handler.dart"
          if [ -f "$AUDIO_HANDLER" ]; then
            perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$AUDIO_HANDLER"
            find lib -name "*.dart" -exec grep -l "unified_audio_handler" {} \; | while read f; do
              [ "$f" = "$AUDIO_HANDLER" ] || ! grep -q '\bRepeatMode\b' "$f" || perl -i -pe 's/\bRepeatMode\b/AudioRepeatMode/g' "$f"
            done
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install macOS Rust targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build macOS
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          dart run flutter_rust_bridge_codegen build-macos --release 2>/dev/null || true

          if [ -f "Makefile" ]; then
            make macos || true
          fi

          flutter build macos --release --build-name="${{ needs.setup.outputs.version }}"
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

      - name: Create universal ZIP
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          cd build/macos/Build/Products/Release
          zip -r $GITHUB_WORKSPACE/${APP}-${VERSION}-${DATE}-macos-unsigned.zip *.app

      - name: Set artifact info
        id: artifact
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          echo "name=${APP}-${VERSION}-${DATE}-macos-unsigned.zip" >> $GITHUB_OUTPUT

      - name: Set build status
        id: status
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-macos
          path: ${{ needs.setup.outputs.app_name }}-*-macos-unsigned.zip

  # ============================================================================
  # GENERATE METADATA AND RELEASE
  # ============================================================================
  generate-metadata:
    needs: [setup, build-ios, build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create build-v2 directory
        run: mkdir -p build-v2

      - name: Generate altstore.json
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          TAG="${{ needs.setup.outputs.release_tag }}"
          CHANGELOG="${{ needs.setup.outputs.changelog }}"
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          ICON_URL="${{ needs.setup.outputs.icon_url }}"
          HEADER_URL="https://gitlab.com/Openlyst/repos/altstore/-/raw/main/header.png?ref_type=heads"
          SCREENSHOT_BASE="${{ needs.setup.outputs.screenshot_base }}"
          SCREENSHOTS="${{ needs.setup.outputs.screenshots }}"
          BASE_BUNDLE_ID="${{ needs.setup.outputs.bundle_id }}"

          # Determine app name and bundle identifier based on build type
          if [ "$BUILD_TYPE" == "nightly" ]; then
            APP_NAME="${APP^} Nightly"
            BUNDLE_ID="${BASE_BUNDLE_ID}.nightly"
            SUBTITLE="Nightly builds - latest features and bug fixes"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            APP_NAME="${APP^} Beta"
            BUNDLE_ID="${BASE_BUNDLE_ID}.pre"
            SUBTITLE="Pre-release builds - test upcoming features"
          else
            APP_NAME="${APP^}"
            BUNDLE_ID="${BASE_BUNDLE_ID}"
            SUBTITLE="Music player for self-hosted services"
          fi

          # Build screenshot URLs
          SCREENSHOT_URLS=$(echo "$SCREENSHOTS" | tr ',' '\n' | while read shot; do
            echo "${SCREENSHOT_BASE}/${shot}"
          done | paste -sd ',' -)

          # Check if altstore.json already exists
          if [ -f "build-v2/altstore.json" ]; then
            # Update existing file - add new version to the app
            jq --arg version "$VERSION" \
               --arg date "$DATE" \
               --arg download_url "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-ios-unsigned.ipa" \
               --arg size "$(stat -f%z artifacts/${APP}-ios/${APP}-*-ios-unsigned.ipa 2>/dev/null || stat -c%s artifacts/${APP}-ios/${APP}-*-ios-unsigned.ipa)" \
               --arg changelog "$CHANGELOG" \
               --arg bundle_id "$BUNDLE_ID" \
               --arg app_name "$APP_NAME" \
               --arg subtitle "$SUBTITLE" \
               --arg icon_url "$ICON_URL" \
               --arg screenshot_urls "$SCREENSHOT_URLS" \
               --arg app "$APP" \
               '
                .iconURL = $icon_url |
                .headerURL = "https://gitlab.com/Openlyst/repos/altstore/-/raw/main/header.png?ref_type=heads" |
                if (.apps[] | select(.bundleIdentifier == $bundle_id)) == null then
                  .apps += [{
                    name: $app_name,
                    bundleIdentifier: $bundle_id,
                    developerName: "OpenLyst Developer",
                    subtitle: $subtitle,
                    localizedDescription: "\($app^) is a music player for self-hosted libraries. Connect Jellyfin, Plex, or Navidrome and listen from your own servers.",
                    iconURL: $icon_url,
                    tintColor: "#dc2626",
                    category: "other",
                    versions: [{
                      version: $version,
                      buildVersion: "1",
                      date: $date,
                      downloadURL: $download_url,
                      size: ($size | tonumber),
                      localizedDescription: $changelog
                    }],
                    screenshots: ($screenshot_urls | split(","))
                  }]
                else
                  .apps |= map(
                    if .bundleIdentifier == $bundle_id then
                      .name = $app_name |
                      .subtitle = $subtitle |
                      .iconURL = $icon_url |
                      .screenshots = ($screenshot_urls | split(",")) |
                      .versions = .versions + [{
                        version: $version,
                        buildVersion: "1",
                        date: $date,
                        downloadURL: $download_url,
                        size: ($size | tonumber),
                        localizedDescription: $changelog
                      }]
                    else
                      .
                    end
                  )
                end
               ' build-v2/altstore.json > build-v2/altstore.json.tmp && mv build-v2/altstore.json.tmp build-v2/altstore.json
          else
            # Create new file
            cat > build-v2/altstore.json << EOF
          {
            "name": "OpenLyst iOS Apps",
            "subtitle": "Free and open source iOS applications",
            "description": "A curated collection of free and open source iOS applications from OpenLyst.",
            "iconURL": "$ICON_URL",
            "headerURL": "$HEADER_URL",
            "website": "https://openlyst.ink",
            "tintColor": "#dc2626",
            "featuredApps": ["$APP"],
            "apps": [
              {
                "name": "$APP_NAME",
                "bundleIdentifier": "$BUNDLE_ID",
                "developerName": "OpenLyst Developer",
                "subtitle": "$SUBTITLE",
                "localizedDescription": "${APP^} is a music player for self-hosted libraries. Connect Jellyfin, Plex, or Navidrome and listen from your own servers.",
                "iconURL": "$ICON_URL",
                "tintColor": "#dc2626",
                "category": "other",
                "versions": [
                  {
                    "version": "$VERSION",
                    "buildVersion": "1",
                    "date": "$DATE",
                    "downloadURL": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-ios-unsigned.ipa",
                    "size": $(stat -f%z artifacts/${APP}-ios/${APP}-*-ios-unsigned.ipa 2>/dev/null || stat -c%s artifacts/${APP}-ios/${APP}-*-ios-unsigned.ipa),
                    "localizedDescription": "$CHANGELOG"
                  }
                ],
                "screenshots": [
                  $(echo "$SCREENSHOT_URLS" | sed 's/,/,\n/g' | sed 's/^/                  "/' | sed 's/$/",/')
                ]
              }
            ],
            "news": []
          }
          EOF
          fi

      - name: Generate apps.json
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          VERSION="${{ needs.setup.outputs.version }}"
          DATE="${{ needs.setup.outputs.build_date }}"
          TAG="${{ needs.setup.outputs.release_tag }}"
          COMMIT=""
          CHANGELOG="${{ needs.setup.outputs.changelog }}"
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          ICON_URL="${{ needs.setup.outputs.icon_url }}"
          SCREENSHOT_BASE="${{ needs.setup.outputs.screenshot_base }}"
          SCREENSHOTS="${{ needs.setup.outputs.screenshots }}"
          BASE_BUNDLE_ID="${{ needs.setup.outputs.bundle_id }}"

          # Determine release type
          if [ "$BUILD_TYPE" == "nightly" ]; then
            RELEASE_TYPE="nightly"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            RELEASE_TYPE="pre-release"
          else
            RELEASE_TYPE="Stable"
          fi

          # Build screenshot URLs
          SCREENSHOT_URLS=$(echo "$SCREENSHOTS" | tr ',' '\n' | while read shot; do
            echo "${SCREENSHOT_BASE}/${shot}"
          done | paste -sd ',' -)

          # Check if apps.json already exists
          if [ -f "build-v2/apps.json" ]; then
            # Update existing file - add new version
            jq --arg version "$VERSION" \
               --arg date "$DATE" \
               --arg tag "$TAG" \
               --arg release_type "$RELEASE_TYPE" \
               --arg commit "$COMMIT" \
               --arg changelog "$CHANGELOG" \
               --arg icon_url "$ICON_URL" \
               --arg screenshot_urls "$SCREENSHOT_URLS" \
               --arg app "$APP" \
               '
                .iconURL = $icon_url |
                .screenshots = ($screenshot_urls | split(",")) |
                .versions = .versions + [{
                  version: $version,
                  date: $date,
                  releaseTag: $tag,
                  releaseType: $release_type,
                  sourceCode: "https://gitlab.com/Openlyst/\($app)/-/tree/\($commit)",
                  platforms: ["iOS", "macOS", "Windows", "Linux", "Android"],
                  platformInstall: {
                    iOS: "Add the altstore repo https://github.com/openlyst/builds/raw/main/build-v2/altstore.json",
                    Android: "Download APK from GitHub Releases",
                    macOS: "Download from GitHub Releases",
                    Windows: "Download from GitHub Releases",
                    Linux: "Download from GitHub Releases"
                  },
                  downloads: {
                    iOS: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-ios-unsigned.ipa",
                    macOS: {
                      x86_64: "",
                      arm64: "",
                      universal: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-macos-unsigned.zip",
                      homebrew: ""
                    },
                    Windows: {
                      zip: {
                        universal: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-windows-x64.zip"
                      },
                      installer: {
                        universal: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-windows-x64-setup.exe"
                      }
                    },
                    Linux: {
                      zip: {
                        universal: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-linux-x64.zip"
                      },
                      appimage: {
                        x86_64: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-linux-x86_64.AppImage"
                      },
                      deb: {
                        x86_64: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date)-linux-amd64.deb"
                      }
                    },
                    Android: {
                      apk: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date).apk",
                      aab: "https://github.com/openlyst/builds/releases/download/\($tag)/\($app)-\($version)-\($date).aab"
                    }
                  },
                  localizedDescription: {
                    en: $changelog,
                    zh: $changelog,
                    ru: $changelog
                  }
                }]
               ' build-v2/apps.json > build-v2/apps.json.tmp && mv build-v2/apps.json.tmp build-v2/apps.json
          else
            # Create new file
            cat > build-v2/apps.json <<EOF
          {
            "bundleIdentifier": "$BASE_BUNDLE_ID",
            "applicationId": "gitlab.openlyst.$APP",
            "name": {
              "en": "${APP^}",
              "zh": "${APP^}",
              "ru": "${APP^}"
            },
            "subtitle": {
              "en": "Music player for self-hosted services",
              "zh": "自托管服务的音乐播放器",
              "ru": "Музыкальный плеер для самостоятельного хостинга"
            },
            "localizedDescription": {
              "en": "${APP^} is a music player for self-hosted libraries. Connect Jellyfin, Plex, or Navidrome and listen from your own servers.",
              "zh": "${APP^}是一款面向自托管音乐库的播放器。连接 Jellyfin、Plex 或 Navidrome，即可从你自己的服务器收听音乐。",
              "ru": "${APP^} — музыкальный плеер для самохост-коллекций. Подключайте Jellyfin, Plex или Navidrome и слушайте музыку со своих серверов."
            },
            "iconURL": "$ICON_URL",
            "tintColor": "#dc2626",
            "platforms": [
              "iOS",
              "macOS",
              "Windows",
              "Linux",
              "Android"
            ],
            "screenshots": [
              $(echo "$SCREENSHOT_URLS" | sed 's/,/,\n/g' | sed 's/^/              "/' | sed 's/$/",/')
            ],
            "deprecated": false,
            "versions": [
              {
                "version": "$VERSION",
                "date": "$DATE",
                "releaseTag": "$TAG",
                "releaseType": "$RELEASE_TYPE",
                "sourceCode": "https://gitlab.com/Openlyst/$APP/-/tree/$COMMIT",
                "platforms": [
                  "iOS",
                  "macOS",
                  "Windows",
                  "Linux",
                  "Android"
                ],
                "platformInstall": {
                  "iOS": "Add the altstore repo https://github.com/openlyst/builds/raw/main/build-v2/altstore.json",
                  "Android": "Download APK from GitHub Releases",
                  "macOS": "Download from GitHub Releases",
                  "Windows": "Download from GitHub Releases",
                  "Linux": "Download from GitHub Releases"
                },
                "downloads": {
                  "iOS": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-ios-unsigned.ipa",
                  "macOS": {
                    "x86_64": "",
                    "arm64": "",
                    "universal": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-macos-unsigned.zip",
                    "homebrew": ""
                  },
                  "Windows": {
                    "zip": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-windows-x64.zip",
                      "arm64": ""
                    },
                    "exe": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-windows-x64-setup.exe",
                      "arm64": ""
                    },
                    "msi": {
                      "x86_64": "",
                      "arm64": ""
                    },
                    "msix": {
                      "x86_64": "",
                      "arm64": ""
                    },
                    "portable": {
                      "x86_64": "",
                      "arm64": ""
                    },
                    "winget": "",
                    "chocolatey": "",
                    "scoop": ""
                  },
                  "Linux": {
                    "zip": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-linux-x64.zip",
                      "arm64": ""
                    },
                    "appimage": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-linux-x86_64.AppImage",
                      "arm64": ""
                    },
                    "deb": {
                      "x86_64": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}-linux-amd64.deb",
                      "arm64": ""
                    },
                    "aur": {
                      "x86_64": "",
                      "arm64": ""
                    }
                  },
                  "Android": {
                    "apk": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}.apk",
                    "aab": "https://github.com/openlyst/builds/releases/download/${TAG}/${APP}-${VERSION}-${DATE}.aab"
                  }
                },
                "localizedDescription": {
                  "en": "$CHANGELOG",
                  "zh": "$CHANGELOG",
                  "ru": "$CHANGELOG"
                }
              }
            ]
          }
          EOF
          fi

      - name: Validate JSON files
        run: |
          python3 -m json.tool build-v2/altstore.json > /dev/null
          python3 -m json.tool build-v2/apps.json > /dev/null

      - name: Prepare release body
        run: |
          printf '%s' "${{ needs.setup.outputs.changelog }}" | sed 's/\\n/\n/g' > release_body.txt

      - name: Create GitHub Release and upload artifacts
        id: release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.setup.outputs.release_tag }}
          name: ${{ needs.setup.outputs.app_name }} ${{ needs.setup.outputs.version }} (${{ needs.setup.outputs.build_date }})
          body_path: release_body.txt
          draft: false
          prerelease: ${{ needs.setup.outputs.build_type != 'stable' }}
          files: |
            ./artifacts/${{ needs.setup.outputs.app_name }}-ios/*.ipa
            ./artifacts/${{ needs.setup.outputs.app_name }}-android/*.apk
            ./artifacts/${{ needs.setup.outputs.app_name }}-android/*.aab
            ./artifacts/${{ needs.setup.outputs.app_name }}-windows/*.zip
            ./artifacts/${{ needs.setup.outputs.app_name }}-windows/*.exe
            ./artifacts/${{ needs.setup.outputs.app_name }}-linux/*.zip
            ./artifacts/${{ needs.setup.outputs.app_name }}-linux/artifacts/*.AppImage
            ./artifacts/${{ needs.setup.outputs.app_name }}-linux/artifacts/*.deb
            ./artifacts/${{ needs.setup.outputs.app_name }}-macos/*.zip

      - name: Upload metadata files
        uses: actions/upload-artifact@v4
        with:
          name: build-v2-metadata
          path: build-v2/

  # ============================================================================
  # PUSH AUR PACKAGES
  # ============================================================================
  push-aur:
    needs: [setup, generate-metadata]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.generate-metadata.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate AUR PKGBUILDs
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "stable" ]; then
            python build.py --target aur --app "$APP" --verbose
          elif [ "$BUILD_TYPE" == "nightly" ]; then
            python build.py --target aur --unstable-aur-only --app "$APP" --verbose
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            python build.py --target aur --unstable-aur-only --app "$APP" --verbose
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

      - name: Generate .SRCINFO for AUR packages
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "nightly" ]; then
            PKG_PATTERN="aur-packages/${APP}-nightly/"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            PKG_PATTERN="aur-packages/${APP}-unstable/"
          elif [ "$BUILD_TYPE" == "stable" ]; then
            PKG_PATTERN="aur-packages/${APP}-bin/"
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

          shopt -s nullglob
          for pkg in $PKG_PATTERN; do
            pkg=$(basename "$pkg")
            if [ ! -f "aur-packages/$pkg/PKGBUILD" ]; then continue; fi
            docker run --rm \
              -v "$PWD/aur-packages/$pkg:/pkg:rw" \
              archlinux:latest \
              bash -c "pacman -Syu --noconfirm base-devel 2>/dev/null; useradd -m -u 1000 builduser; chown -R builduser:builduser /pkg; su builduser -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"
          done

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY_BASE64: ${{ secrets.AUR_SSH_KEY_BASE64 }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$AUR_SSH_KEY_BASE64" | base64 -d > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push packages to AUR
        env:
          AUR_SSH_KEY_PASSWORD: ${{ secrets.AUR_SSH_KEY_PASSWORD }}
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          BUILD_TYPE="${{ needs.setup.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "nightly" ]; then
            PKG_PATTERN="aur-packages/${APP}-nightly/"
          elif [ "$BUILD_TYPE" == "pre-release" ]; then
            PKG_PATTERN="aur-packages/${APP}-unstable/"
          elif [ "$BUILD_TYPE" == "stable" ]; then
            PKG_PATTERN="aur-packages/${APP}-bin/"
          else
            echo "Unknown build type: $BUILD_TYPE"
            exit 0
          fi

          set -e
          eval "$(ssh-agent -s)"
          printf '%s' "$AUR_SSH_KEY_PASSWORD" | ssh-add ~/.ssh/aur_key 2>/dev/null || true
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
          mkdir -p aur-push
          shopt -s nullglob
          for pkg in $PKG_PATTERN; do
            pkg=$(basename "$pkg")
            if [ ! -f "aur-packages/$pkg/PKGBUILD" ]; then continue; fi
            echo "Updating AUR package: $pkg"
            if ! git clone --depth 1 "ssh://aur@aur.archlinux.org/${pkg}.git" "aur-push/$pkg" 2>&1; then
              echo "::warning::Clone failed for $pkg (create package on AUR first or check push access)"
              continue
            fi
            cp -f "aur-packages/$pkg/PKGBUILD" "aur-packages/$pkg/.SRCINFO" "aur-push/$pkg/" 2>/dev/null || true
            cd "aur-push/$pkg"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PKGBUILD .SRCINFO
            if ! git diff --staged --quiet; then
              git commit -m "Update to latest from GitHub releases (Build Apps)"
              git push origin master
            else
              echo "No changes for $pkg"
            fi
            cd ../..
          done
          rm -rf aur-push

  # ============================================================================
  # COMMIT METADATA TO REPOSITORY
  # ============================================================================
  commit-metadata:
    needs: generate-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          name: build-v2-metadata
          path: build-v2

      - name: Commit metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-v2/
          git diff --staged --quiet || git commit -m "Update build-v2 metadata for ${{ needs.generate-metadata.outputs.release_created }}"
          git push
