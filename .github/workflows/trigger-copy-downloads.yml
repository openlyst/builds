name: Trigger Copy Downloads Mirror

on:
  release:
    types: [published]

jobs:
  trigger-copy-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger copy-downloads pipeline
        env:
          GITLAB_API_URL: ${{ secrets.GITLAB_API_URL }}
          GITLAB_PROJECT_ID: ${{ secrets.COPY_DOWNLOADS_GITLAB_PROJECT_ID }}
          GITLAB_TRIGGER_TOKEN: ${{ secrets.COPY_DOWNLOADS_GITLAB_TRIGGER_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          base="${GITLAB_API_URL:-https://gitlab.com/api/v4}"
          if [ -z "${GITLAB_PROJECT_ID:-}" ] || [ -z "${GITLAB_TRIGGER_TOKEN:-}" ]; then
            echo "Missing COPY_DOWNLOADS_GITLAB_PROJECT_ID or COPY_DOWNLOADS_GITLAB_TRIGGER_TOKEN"
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -F "token=${GITLAB_TRIGGER_TOKEN}" \
            -F "ref=main" \
            -F "variables[MIRROR_TAG]=${RELEASE_TAG}" \
            -F "variables[GITHUB_BASE_URL]=https://github.com/openlyst/builds" \
            "${base}/projects/${GITLAB_PROJECT_ID}/trigger/pipeline")

          code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$code" != "201" ]; then
            echo "Failed to trigger copy-downloads pipeline (HTTP $code): $body"
            exit 1
          fi

          echo "Triggered copy-downloads for ${RELEASE_TAG}"
          echo "$body"
